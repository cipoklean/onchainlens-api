services:
  - type: web
    name: onchainlens-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GOPLUS_API_KEY
        sync: false
      - key: API_BEARER_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CACHE_TTL
        sync: false
      - key: RATE_LIMIT
        sync: false
      - key: LOG_LEVEL
        sync: false
